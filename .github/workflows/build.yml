name: Build APK

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Build flavor'
        required: true
        default: 'leanbackArm64_v8a'
        type: choice
        options:
          - leanbackArm64_v8a
          - leanbackArmeabi_v7a
          - mobileArm64_v8a
          - mobileArmeabi_v7a

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: ./gradlew assembleLeanbackRelease

      - uses: actions/upload-artifact@v4
        with:
          name: leanback-arm64_v8a
          path: app/build/outputs/apk/leanback/release/*.apk