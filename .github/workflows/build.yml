name: Build APK

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Build flavor'
        required: true
        default: 'leanbackArm64_v8a'
        type: choice
        options:
          - leanbackArm64_v8a
          - leanbackArmeabi_v7a
          - mobileArm64_v8a
          - mobileArmeabi_v7a

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.jks

      - name: Create local.properties
        run: |
          echo "storeFile=release.jks" >> local.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> local.properties
          echo "keyAlias=shipin" >> local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties

      - name: Build APK
        run: ./gradlew assemble${{ github.event.inputs.flavor }}Release

      - uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.event.inputs.flavor }}
          path: app/build/outputs/apk/**/release/*.apk
